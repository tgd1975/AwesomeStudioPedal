name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cpp-format:
    name: C++ Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check C++ code formatting
        run: |
          # Find all C++ files
          FILES=$(find . -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | grep -v \.pio | grep -v build)
          if [ -n "$FILES" ]; then
            echo "Checking formatting for files:"
            echo "$FILES"
            clang-format --dry-run --Werror $FILES
          else
            echo "No C++ files found to check"
          fi

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: "*.md"

  mermaid-lint:
    name: Mermaid Diagram Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Mermaid validation script
        run: python scripts/validate_mermaid.py

  unit-tests:
    name: Host Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: .vscode/build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'test/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build g++

      - name: Configure CMake
        run: |
          cmake -B .vscode/build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -Wno-dev

      - name: Build tests
        run: cmake --build .vscode/build --target pedal_tests -j$(nproc)

      - name: Run tests
        run: |
          mkdir -p test-results
          .vscode/build/test/pedal_tests --gtest_output=xml:test-results/

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/*.xml
          comment_mode: always
          check_name: "GoogleTest Results"

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Generate coverage report
        run: |
          # Generate coverage report using gcovr
          pip install gcovr
          gcovr -r . --xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
