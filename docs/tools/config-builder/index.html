<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AwesomeStudioPedal — Profile Builder</title>
  <link rel="stylesheet" href="config-builder.css">
</head>
<body>

<header class="asp-header">
  <div>
    <h1>AwesomeStudioPedal — Profile Builder</h1>
    <p class="subtitle">Build a profiles.json without writing JSON by hand</p>
  </div>
  <nav style="margin-left:auto;display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
    <a href="../../simulator/">Simulator &rarr;</a>
    <a href="../configuration-builder/">Configuration Builder &rarr;</a>
    <a href="https://github.com/tgd1975/AwesomeStudioPedal/blob/main/docs/builders/KEY_REFERENCE.md"
       target="_blank" rel="noopener">Key Reference &rarr;</a>
  </nav>
</header>

<div class="layout">

  <!-- Form panel -->
  <section class="form-panel">
    <div id="example-notice" style="display:none;" class="">
      Example loaded &mdash; load your own file to replace
    </div>
    <div id="profiles-tabs"></div>
    <div id="active-profile-form"></div>
  </section>

  <!-- Preview panel -->
  <section class="preview-panel">
    <div class="preview-toolbar">
      <button id="btn-validate" class="btn-secondary" title="Validate against JSON schema">Validate</button>
      <button id="btn-download" class="btn-primary" title="Download as profiles.json">Download profiles.json</button>
      <button id="btn-load" class="btn-secondary" title="Load an existing profiles.json">Load existing file</button>
      <button id="btn-community" class="btn-secondary" title="Browse community profile sets">Browse community profiles</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
    <pre id="json-preview"></pre>
    <div id="validation-result"></div>
  </section>

</div>

<!-- Autocomplete datalist for key names -->
<datalist id="key-names-list">
  <option value="KEY_LEFT_ARROW">
  <option value="LEFT_ARROW">
  <option value="KEY_RIGHT_ARROW">
  <option value="RIGHT_ARROW">
  <option value="KEY_UP_ARROW">
  <option value="UP_ARROW">
  <option value="KEY_DOWN_ARROW">
  <option value="DOWN_ARROW">
  <option value="KEY_PAGE_UP">
  <option value="KEY_PAGE_DOWN">
  <option value="KEY_HOME">
  <option value="KEY_END">
  <option value="KEY_INSERT">
  <option value="KEY_DELETE">
  <option value="KEY_BACKSPACE">
  <option value="KEY_TAB">
  <option value="KEY_RETURN">
  <option value="KEY_ENTER">
  <option value="KEY_ESC">
  <option value="KEY_CAPS_LOCK">
  <option value="KEY_PRINTSCREEN">
  <option value="KEY_LEFT_CTRL">
  <option value="KEY_LEFT_SHIFT">
  <option value="KEY_LEFT_ALT">
  <option value="KEY_LEFT_GUI">
  <option value="KEY_RIGHT_CTRL">
  <option value="KEY_RIGHT_SHIFT">
  <option value="KEY_RIGHT_ALT">
  <option value="KEY_RIGHT_GUI">
  <option value="KEY_F1"><option value="F1">
  <option value="KEY_F2"><option value="F2">
  <option value="KEY_F3"><option value="F3">
  <option value="KEY_F4"><option value="F4">
  <option value="KEY_F5"><option value="F5">
  <option value="KEY_F6"><option value="F6">
  <option value="KEY_F7"><option value="F7">
  <option value="KEY_F8"><option value="F8">
  <option value="KEY_F9"><option value="F9">
  <option value="KEY_F10"><option value="F10">
  <option value="KEY_F11"><option value="F11">
  <option value="KEY_F12"><option value="F12">
  <option value="KEY_F13"><option value="F13">
  <option value="KEY_F14"><option value="F14">
  <option value="KEY_F15"><option value="F15">
  <option value="KEY_F16"><option value="F16">
  <option value="KEY_F17"><option value="F17">
  <option value="KEY_F18"><option value="F18">
  <option value="KEY_F19"><option value="F19">
  <option value="KEY_F20"><option value="F20">
  <option value="KEY_F21"><option value="F21">
  <option value="KEY_F22"><option value="F22">

  <option value="KEY_NUM_0">
  <option value="KEY_NUM_1">
  <option value="KEY_NUM_2">
  <option value="KEY_NUM_3">
  <option value="KEY_NUM_4">
  <option value="KEY_NUM_5">
  <option value="KEY_NUM_6">
  <option value="KEY_NUM_7">
  <option value="KEY_NUM_8">
  <option value="KEY_NUM_9">
  <option value="KEY_NUM_SLASH">
  <option value="KEY_NUM_ASTERISK">
  <option value="KEY_NUM_MINUS">
  <option value="KEY_NUM_PLUS">

<script src="vendor/ajv.min.js"></script>
<script src="../profiles-gallery.js"></script>

</body>
</html>
