name: awesome_studio_pedal
description: Configure AwesomeStudioPedal profiles and hardware settings over BLE.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.0
  file_picker: ^8.0.0
  share_plus: ^7.2.2
  provider: ^6.1.2
  go_router: ^13.2.4
  json_schema: ^5.2.0
  path_provider: ^2.1.4
  http: ^1.2.2
  permission_handler: ^12.0.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.13
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/profiles.schema.json
    - assets/config.schema.json
  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis/Metropolis-Regular.otf
        - asset: assets/fonts/metropolis/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/metropolis/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/metropolis/Metropolis-Bold.otf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-Medium.ttf
          weight: 500
