[env:nodemcu-32s]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps = t-vk/ESP32 BLE Keyboard @ ^0.3.2
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude

# On-device integration test environment (requires hardware).
# Place Unity-based test files in test/on_device/ to use this environment.
# Host-based unit tests (GoogleTest) are built via CMake — see CMakeLists.txt.
[env:nodemcu-32s-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps = t-vk/ESP32 BLE Keyboard @ ^0.3.2
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude
test_ignore = src/main.cpp
test_filter = test/on_device/*

[env:feather-nrf52840]
board = adafruit_feather_nrf52840
framework = arduino
platform = nordicnrf52
lib_deps = adafruit/Adafruit nRF52 @ ^1.5.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareESP32
build_flags = -std=gnu++14

# On-device integration test environment for nRF52840 (requires hardware).
[env:feather-nrf52840-test]
board = adafruit_feather_nrf52840
framework = arduino
platform = nordicnrf52
lib_deps = adafruit/Adafruit nRF52 @ ^1.5.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareESP32
build_flags = -std=gnu++14
test_ignore = src/main.cpp
test_filter = test/on_device/*
