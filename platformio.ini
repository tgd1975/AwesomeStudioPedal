[env:nodemcu-32s]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps = t-vk/ESP32 BLE Keyboard @ ^0.3.2
lib_extra_dirs = lib/hardware/esp32
build_flags = -std=gnu++14

# On-device integration test environment (requires hardware).
# Place Unity-based test files in test/on_device/ to use this environment.
# Host-based unit tests (GoogleTest) are built via CMake — see CMakeLists.txt.
[env:nodemcu-32s-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps = t-vk/ESP32 BLE Keyboard @ ^0.3.2
lib_extra_dirs = lib/hardware/esp32
build_flags = -std=gnu++14
test_ignore = src/main.cpp
test_filter = test/on_device/*
