# BLE Config integration test harness (ESP32 only).
# Compiles test/test_ble_config_esp32/test_main.cpp as a standalone firmware
# (not a pio test run). Flash with: pio run -e nodemcu-32s-ble-config-test --target upload
# Then run: python3 test/test_ble_config_esp32/runner.py
# Or use the Make target: make test-esp32-ble-config
# LED hardware diagnostic — ESP32 variant.
# Compiles test/test_leds_shared/test_main.cpp + the platform's config.cpp
# as a minimal standalone firmware that cycles through every LED defined
# in hardwareConfig. Useful for isolating LED-wiring / GPIO problems from
# application state. No lib_extra_dirs or lib_deps — this build is intentionally
# lean (no BLE, no filesystem, no PedalLogic).
# Flash with: make test-esp32-leds
[env:nodemcu-32s-leds-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
build_unflags = -std=gnu++11 -std=c++11
build_flags = -std=gnu++14 -Iinclude -Ilib/hardware/esp32/include
build_src_filter = +<../test/test_leds_shared/test_main.cpp> +<../lib/hardware/esp32/src/config.cpp>

# GPIO 2 onboard-LED probe — ESP32 variant.
# Compiles test/test_gpio2_probe_esp32/test_main.cpp as a standalone firmware
# that toggles GPIO 2 every 500 ms. Used to confirm whether a given dev board
# carries an onboard user LED on GPIO 2 (blue on some clones, absent on the
# Joy-IT SBC-NodeMCU-ESP32 reference design).
# Flash with: make test-esp32-gpio2-probe
[env:nodemcu-32s-gpio2-probe]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
build_unflags = -std=gnu++11 -std=c++11
build_flags = -std=gnu++14
build_src_filter = +<../test/test_gpio2_probe_esp32/test_main.cpp>

# LED hardware diagnostic — nRF52840 variant.
# Flash with: make test-nrf52840-leds
[env:feather-nrf52840-leds-test]
board = adafruit_feather_nrf52840
framework = arduino
platform = nordicnrf52
monitor_speed = 115200
