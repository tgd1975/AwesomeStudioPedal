[env:nodemcu-32s]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    h2zero/NimBLE-Arduino @ ^1.4.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_unflags = -std=gnu++11 -std=c++11
build_flags = -std=gnu++14 -Iinclude -DUSE_NIMBLE
board_build.filesystem = littlefs
board_build.partitions = config/esp32/partitions.csv

# On-device integration test environment (requires hardware).
# Place Unity-based test files in test/test_buttons_esp32/ to use this environment.
# Host-based unit tests (GoogleTest) are built via CMake — see CMakeLists.txt.
[env:nodemcu-32s-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    h2zero/NimBLE-Arduino @ ^1.4.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
lib_ldf_mode = deep
build_unflags = -std=gnu++11 -std=c++11
build_flags = -std=gnu++14 -Iinclude -Itest/fakes -DUSE_NIMBLE
board_build.filesystem = littlefs
board_build.partitions = config/esp32/partitions.csv
test_ignore = test_config_loader
test_filter = test_buttons_esp32

