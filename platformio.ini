    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    bblanchon/ArduinoJson @ ^6.21.0
    file://lib/hardware/esp32
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
lib_ldf_mode = deep
build_unflags = -std=gnu++11 -std=c++11
build_flags = -std=gnu++14 -Iinclude -Itest/fakes
board_build.filesystem = littlefs
board_build.partitions = config/esp32/partitions.csv
test_ignore = test_config_loader
test_filter = test_profilemanager_esp32

# On-device GPIO testrig for PinAction (requires NodeMCU-32S with onboard LED on GPIO 2).
