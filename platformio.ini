[env:nodemcu-32s]
board = nodemcu-32s
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude
board_build.filesystem = littlefs
board_build.partitions = partitions.csv

# On-device integration test environment (requires hardware).
# Place Unity-based test files in test/test_buttons_esp32/ to use this environment.
# Host-based unit tests (GoogleTest) are built via CMake — see CMakeLists.txt.
[env:nodemcu-32s-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude -Itest/fakes
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
test_ignore = src/main.cpp test/test_config_loader.cpp
test_filter = test_buttons_esp32

# On-device test environment for serial output verification (requires hardware).
# Checks that Button B in config set 2 (Custom profile) produces the expected
# serial text. Run with: pio test -e nodemcu-32s-serial-test
[env:nodemcu-32s-serial-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude -Itest/fakes
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
test_ignore = src/main.cpp test/test_config_loader.cpp
test_filter = test_serial_output_esp32

# On-device test environment for ProfileManager + ConfigLoader (requires hardware).
# Tests: loadFromString (0/1/5/7/8 profiles), mergeConfig, replaceProfile, LED encoding.
# Run with: pio test -e nodemcu-32s-profilemanager-test
[env:nodemcu-32s-profilemanager-test]
board = nodemcu-32s
framework = arduino
platform = espressif32
lib_deps =
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    bblanchon/ArduinoJson @ ^6.21.0
lib_extra_dirs = lib/hardware
lib_ignore = HardwareNRF52840
build_flags = -std=gnu++14 -Iinclude -Itest/fakes
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
test_ignore = src/main.cpp test/test_config_loader.cpp
test_filter = test_profilemanager_esp32

